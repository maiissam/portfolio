  <text class="cls-1" transform="translate(895.64 367.33)"><tspan x="0" y="0">Bonjour !</tspan><tspan x="-177.12" y="40.94">Je m&apos;appelle Maïssam Sahmoudi.</tspan><tspan x="-432.8" y="122.83">J&apos;ai choisi le BUT MMI pour sa polyvalence, puis le parcours Création </tspan><tspan x="-343.67" y="163.77">Numérique pour la diversité des domaines qu&apos;il propose. </tspan><tspan x="-451.56" y="245.65">Passionnée par l&apos;art et la création visuelle, j&apos;aime concevoir des projets </tspan><tspan x="-295.44" y="286.59">graphiques et explorer différents univers créatifs.</tspan></text>
